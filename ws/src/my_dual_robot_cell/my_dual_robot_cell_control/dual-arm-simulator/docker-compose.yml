---
services:
  alice:
    image: "universalrobots/ursim_e-series"
    container_name: dual_ursim_alice
    networks:
      ursim_net_dual_arm:
        ipv4_address: 192.168.57.101
    ports:
      - "6081:6080"
      - "5901:5900"
    environment:
      ROBOT_MODEL: "UR3"
    volumes:
      - ./persistent_storage_alice/programs:/ursim/programs
      - ./persistent_storage_alice/urcaps:/urcaps
  bob:
    image: "universalrobots/ursim_e-series"
    container_name: dual_ursim_bob
    networks:
      ursim_net_dual_arm:
        ipv4_address: 192.168.57.100
    ports:
      - "6082:6080"
      - "5902:5900"
    environment:
      ROBOT_MODEL: "UR5"
    volumes:
      - ./persistent_storage_bob/programs:/ursim/programs
      - ./persistent_storage_bob/urcaps:/urcaps

networks:
  ursim_net_dual_arm:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.57.0/24
