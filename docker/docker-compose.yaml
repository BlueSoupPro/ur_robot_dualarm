#version: "3.8"

services:
  dualbot:
    image: dualbot_ubuntu22
    container_name: dualbot_ws
    network_mode: host
    privileged: true
    tty: true
    stdin_open: true
    environment:
      ROS_DOMAIN_ID: 42  
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      QT_X11_NO_MITSHM: "1"
      DISPLAY: $DISPLAY
    build: 
      context: ../
      dockerfile: docker/Dockerfile
    volumes:  
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ../ws:/ws/
      - /dev:/dev
      - ~/.Xauthority:/home/user/.Xauthority:rw
    working_dir: /ws
    command: bash

